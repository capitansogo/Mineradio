name: Build Windows installer

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Syntax check
        run: node --check server.js && node --check yandex.js

      - name: Build NSIS installer
        run: npm run build:win -- --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mineradio-Setup
          path: |
            dist/*-Setup.exe
            dist/*-Setup.exe.blockmap
            dist/latest.yml
          if-no-files-found: error

      - name: Create release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Заметки релиза = верхняя секция CHANGELOG.md (фолбэк — автогенерация).
          awk '/^## /{c++} c==1{print} c==2{exit}' CHANGELOG.md > release-notes.md
          if [ -s release-notes.md ]; then
            gh release create "$GITHUB_REF_NAME" \
              dist/*-Setup.exe dist/*-Setup.exe.blockmap dist/latest.yml \
              --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/*-Setup.exe dist/*-Setup.exe.blockmap dist/latest.yml \
              --title "$GITHUB_REF_NAME" --generate-notes
          fi
